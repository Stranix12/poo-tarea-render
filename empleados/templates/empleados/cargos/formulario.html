{% extends 'empleados/base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="mb-4">
            <h2 class="page-title mb-0">
                <i class="bi bi-briefcase-fill me-2" style="color:#e94560"></i>
                {% if form.instance.pk %}Editar Cargo{% else %}Nuevo Cargo{% endif %}
            </h2>
            <small class="text-muted">Complete los campos del formulario</small>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-tag me-1"></i>Nombre</label>
                {{ form.nombre }}
            </div>
            <div class="mb-4">
                <label class="form-label"><i class="bi bi-card-text me-1"></i>Descripción</label>
                {{ form.descripcion }}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn-guardar btn">
                    <i class="bi bi-check-lg me-1"></i>Guardar
                </button>
                <a href="{% url 'cargo_listar' %}" class="btn-cancelar btn">
                    <i class="bi bi-x-lg me-1"></i>Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
