<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CRUD Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #e94560, #c73652);
            padding: 40px 30px;
            border-radius: 15px 15px 0 0;
            color: white;
            text-align: center;
        }
        .login-header i {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }
        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
        }
        .login-body {
            padding: 40px;
            background: white;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1.5px solid #ddd;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
            color: #333;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .btn-login {
            background: linear-gradient(135deg, #e94560, #c73652);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-login:hover {
            color: white;
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
            transform: translateY(-2px);
        }
        .alert {
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
        }
        .divider {
            height: 1px;
            background: #eee;
            margin: 25px 0;
        }
        .credentials {
            background: #f8f9fa;
            border-left: 4px solid #e94560;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .credentials p {
            margin: 0;
            font-size: 0.85rem;
            color: #555;
        }
        .credentials code {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-people-fill"></i>
                <h1>CRUD Django</h1>
            </div>
            <div class="login-body">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-person me-1"></i>Usuario
                        </label>
                        <input type="text" name="username" class="form-control" required autofocus placeholder="Ingresa tu usuario">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-lock me-1"></i>Contraseña
                        </label>
                        <input type="password" name="password" class="form-control" required placeholder="Ingresa tu contraseña">
                    </div>
                    <button type="submit" class="btn-login">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
                    </button>
                </form>

                <div class="divider"></div>

                <div class="credentials">
                    <p><strong>Credenciales de demostración:</strong></p>
                    <p class="mt-2"><i class="bi bi-person"></i> Usuario: <code>admin</code></p>
                    <p><i class="bi bi-key"></i> Contraseña: <code>123</code></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
